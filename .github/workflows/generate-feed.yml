name: Generate RSS Feed

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit dates)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate RSS feed
        run: python generate_feed.py

      - name: Commit feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "feed.xml unchanged, nothing to commit"
          else
            git commit -m "Update RSS feed [skip ci]"
            git push
          fi
